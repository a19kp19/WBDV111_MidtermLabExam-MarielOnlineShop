<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Mariel Store</title>
  <meta name="description" content="Manage your Mariel Store account — update your profile, saved addresses, and password.">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../images/logo.png">
</head>
<body data-page="account">

<div id="site-header"></div>

<section class="page-header">
  <div class="container">
    <h1>My <em>Account</em></h1>
    <p>View and update your account details.</p>
  </div>
</section>

<section class="section section-white">
  <div class="container">
    <div class="account-card">
      <div class="account-head">
        <h2>Profile <em>Details</em></h2>
        <button id="edit-profile-btn" class="btn btn-outline">Edit Profile</button>
      </div>

      <div id="account-view">
        <div class="account-row"><span class="k">Username</span><span class="v" id="account-username">—</span></div>
        <div class="account-row"><span class="k">Full Name</span><span class="v" id="account-full-name">—</span></div>
        <div class="account-row"><span class="k">Email</span><span class="v" id="account-email">—</span></div>
        <div class="account-row"><span class="k">Phone</span><span class="v" id="account-phone">—</span></div>
      </div>

      <form id="account-edit" class="hidden" novalidate>
        <div class="field">
          <label for="edit-username">Username</label>
          <input type="text" id="edit-username" required>
        </div>
        <div class="field">
          <label for="edit-full-name">Full Name</label>
          <input type="text" id="edit-full-name" required>
        </div>
        <div class="field">
          <label for="edit-email">Email</label>
          <input type="email" id="edit-email" disabled>
          <p class="hint">Email cannot be changed here.</p>
        </div>
        <div class="field">
          <label for="edit-phone">Phone</label>
          <input type="tel" id="edit-phone" placeholder="e.g. 09171234567">
        </div>
        <div class="row">
          <button type="submit" class="btn">Save Changes</button>
          <button type="button" id="cancel-edit-btn" class="btn btn-outline">Cancel</button>
        </div>
        <p id="edit-message" class="form-msg"></p>
      </form>
    </div>
    
    <div class="account-card" style="margin-top:24px">
      <div class="account-head">
        <h2>Saved <em>Addresses</em></h2>
        <button id="addr-add-btn" class="btn btn-outline" type="button">+ Add Address</button>
      </div>
      <p class="muted" style="margin:0 0 14px;font-size:.9rem">Save up to 3 addresses (Home, Work, Other). Your default address auto-fills at checkout.</p>

      <div id="addresses-list"></div>

      <form id="address-form" class="hidden" novalidate style="margin-top:18px;border-top:1px solid var(--line,#eee);padding-top:18px">
        <input type="hidden" id="addr-id" value="">
        <h3 id="addr-form-title" style="margin:0 0 12px">Add Address</h3>
        <div class="checkout-fields">
          <div class="field">
            <label for="addr-label">Label</label>
            <select id="addr-label" required>
              <option value="Home">Home</option>
              <option value="Work">Work</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="addr-name">Recipient Name</label>
            <input type="text" id="addr-name" required>
          </div>
          <div class="field">
            <label for="addr-phone">Phone</label>
            <input type="tel" id="addr-phone" required placeholder="e.g. 09171234567">
          </div>
          <div class="field">
            <label for="addr-region">Region</label>
            <select id="addr-region" required>
              <option value="">Select region…</option>
              <option value="ncr">Metro Manila (NCR)</option>
              <option value="luzon">Luzon (outside NCR)</option>
              <option value="visayas">Visayas</option>
              <option value="mindanao">Mindanao</option>
            </select>
          </div>
          <div class="field co-full">
            <label for="addr-line">Street Address</label>
            <input type="text" id="addr-line" required placeholder="House #, Street, Barangay">
          </div>
          <div class="field">
            <label for="addr-city">City / Municipality</label>
            <input type="text" id="addr-city" required>
          </div>
          <div class="field">
            <label for="addr-province">Province</label>
            <input type="text" id="addr-province" required>
          </div>
          <div class="field">
            <label for="addr-postal">Postal Code <span class="muted">(optional)</span></label>
            <input type="text" id="addr-postal" inputmode="numeric">
          </div>
          <div class="field co-full">
            <label class="check-row"><input type="checkbox" id="addr-default"> Set as default address</label>
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button type="submit" class="btn">Save Address</button>
          <button type="button" id="addr-cancel-btn" class="btn btn-outline">Cancel</button>
        </div>
        <p id="addr-message" class="form-msg"></p>
      </form>
    </div>

  </div>
</section>

<div id="site-footer"></div>

<script src="../script.js"></script>
</body>
</html>
