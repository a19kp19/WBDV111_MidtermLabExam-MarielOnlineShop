<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Mariel Store</title>
    <meta name="description" content="Create a Mariel Store account to start shopping with flexible installment plans across the Philippines.">
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="../images/logo.png" />
  </head>
  <body data-page="register">
    <div id="site-header"></div>

    <section class="page-header">
      <div class="container">
        <h1>Create an <em>Account</em></h1>
        <p>Register to start shopping with Mariel Store.</p>
      </div>
    </section>

    <section class="section section-white">
      <div class="container">
        <div class="auth-card">
          <h2>Sign Up</h2>
          <p class="lead">It only takes a minute.</p>

          <form id="register-form" novalidate>
            <div class="field">
              <label for="username">Username</label>
              <input type="text" id="username" required />
            </div>
            <div class="field">
              <label for="full-name">Full Name</label>
              <input type="text" id="full-name" required />
            </div>
            <div class="field">
              <label for="email">Email Address</label>
              <input type="email" id="email" required />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <div class="password-wrap">
                <input type="password" id="password" required />
                <button
                  type="button"
                  class="password-toggle"
                  data-toggle="password"
                  data-group="register-pw"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
              <p id="password-hint" class="hint">
                Use uppercase, lowercase, number, and a special character.
              </p>
            </div>
            <div class="field">
              <label for="confirm-password">Confirm Password</label>
              <div class="password-wrap">
                <input type="password" id="confirm-password" required />
                <button
                  type="button"
                  class="password-toggle"
                  data-toggle="confirm-password"
                  data-group="register-pw"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-block">Create Account</button>
          </form>

          <p id="form-message" class="form-msg"></p>

          <p class="auth-switch">
            Already have an account? <a href="login.html">Login here</a>
          </p>
        </div>
      </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
  </body>
</html>
