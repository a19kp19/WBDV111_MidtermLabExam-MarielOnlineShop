<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Mariel Store</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../images/logo.png">
</head>
<body data-page="register">

<div id="site-header"></div>

<section class="page-header">
  <div class="container">
    <h1>Create an <em>Account</em></h1>
    <p>Register to start shopping with Mariel Store.</p>
  </div>
</section>

<section class="section section-white">
  <div class="container">
    <div class="auth-card">
      <h2>Sign Up</h2>
      <p class="lead">It only takes a minute.</p>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="field">
          <label for="full-name">Full Name</label>
          <input type="text" id="full-name" required>
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required>
          <p id="password-hint" class="hint">Use uppercase, lowercase, number, and a special character.</p>
        </div>
        <div class="field">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" required>
        </div>
        <button type="submit" class="btn btn-block">Create Account</button>
      </form>

      <p id="form-message" class="form-msg"></p>

      <div class="divider">or sign up with</div>

      <div class="social-row">
        <button type="button" id="google-register" class="social-btn" aria-label="Google">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.7 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.6 14.6 2.7 12 2.7 6.9 2.7 2.7 6.9 2.7 12S6.9 21.3 12 21.3c6.9 0 9.1-4.8 9.1-7.3 0-.5 0-.8-.1-1.2H12z"/>
            <path fill="#34A853" d="M3.8 7.4l3.2 2.3C7.9 8 9.8 6.6 12 6.6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.6 14.6 2.7 12 2.7 8.3 2.7 5.1 4.8 3.8 7.4z"/>
            <path fill="#FBBC05" d="M3.8 16.6l3.2-2.3C6.7 13.7 6.6 12.9 6.6 12c0-.9.1-1.7.4-2.3L3.8 7.4C3.1 8.8 2.7 10.3 2.7 12s.4 3.2 1.1 4.6z"/>
            <path fill="#4285F4" d="M12 21.3c2.5 0 4.7-.8 6.3-2.3l-3-2.4c-.8.6-1.9 1-3.3 1-2.2 0-4.1-1.4-4.8-3.4l-3.2 2.3c1.3 2.7 4.5 4.8 8 4.8z"/>
          </svg>
        </button>
      </div>

      <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="../script.js"></script>
</body>
</html>
