<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Mariel Store</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../images/logo.png">
</head>
<body data-page="reset-password">

<div id="site-header"></div>

<section class="page-header">
  <div class="container">
    <h1>Reset Your <em>Password</em></h1>
    <p>Set a new password for your Mariel Store account.</p>
  </div>
</section>

<section class="section section-white">
  <div class="container">
    <div class="auth-card">
      <h2>New Password</h2>
      <p class="lead">Choose a strong password you'll remember.</p>

      <form id="reset-form" novalidate>
        <div class="field">
          <label for="reset-password">New Password</label>
          <input type="password" id="reset-password" required>
          <p id="reset-password-hint" class="hint">Use uppercase, lowercase, number, and a special character.</p>
        </div>
        <div class="field">
          <label for="reset-confirm">Confirm New Password</label>
          <input type="password" id="reset-confirm" required>
        </div>
        <button type="submit" class="btn btn-block">Update Password</button>
      </form>

      <p id="reset-message" class="form-msg"></p>

      <p class="auth-switch"><a href="login.html">Back to Login</a></p>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="../script.js"></script>
</body>
</html>
