<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Mariel Store</title>
    <meta name="description" content="Sign in to your Mariel Store account to manage orders and shop with installment plans.">
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" href="../images/logo.png" />
  </head>
  <body data-page="login">
    <div id="site-header"></div>

    <section class="page-header">
      <div class="container">
        <h1>Welcome <em>Back</em></h1>
        <p>Sign in to your Mariel Store account.</p>
      </div>
    </section>

    <section class="section section-white">
      <div class="container">
        <div class="auth-card">
          <h2>Login</h2>
          <p class="lead">Enter your details to continue shopping.</p>

          <form id="login-form" novalidate>
            <div class="field">
              <label for="login-email">Email Address</label>
              <input type="email" id="login-email" required />
            </div>
            <div class="field">
              <label for="login-password">Password</label>
              <div class="password-wrap">
                <input type="password" id="login-password" required />
                <button
                  type="button"
                  class="password-toggle"
                  data-toggle="login-password"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-block">Login</button>
          </form>

          <p id="login-message" class="form-msg"></p>

          <p class="auth-switch">
            Don't have an account? <a href="register.html">Register here</a>
          </p>
        </div>
      </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
  </body>
</html>
