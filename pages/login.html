<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mariel Store</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../images/logo.png">
</head>
<body data-page="login">

<div id="site-header"></div>

<section class="page-header">
  <div class="container">
    <h1>Welcome <em>Back</em></h1>
    <p>Sign in to your Mariel Store account.</p>
  </div>
</section>

<section class="section section-white">
  <div class="container">
    <div class="auth-card">
      <h2>Login</h2>
      <p class="lead">Enter your details to continue shopping.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="login-password" required>
            <button type="button" class="password-toggle" data-toggle="login-password" aria-label="Show password">Show</button>
          </div>
        </div>
        <div class="forgot-row">
          <button type="button" id="forgot-password-link" class="link-btn">Forgot password?</button>
        </div>
        <button type="submit" class="btn btn-block">Login</button>
      </form>

      <p id="login-message" class="form-msg"></p>

      <form id="forgot-form" class="hidden" novalidate>
        <h3 style="margin-top:18px">Reset Password</h3>
        <p class="lead" style="margin-bottom:14px">Enter your email and we'll send you a reset link.</p>
        <div class="field">
          <label for="forgot-email">Email Address</label>
          <input type="email" id="forgot-email" required>
        </div>
        <div class="row">
          <button type="submit" class="btn">Send Reset Link</button>
          <button type="button" id="cancel-forgot-btn" class="btn btn-outline">Cancel</button>
        </div>
        <p id="forgot-message" class="form-msg"></p>
      </form>
      <div class="divider">or continue with</div>

      <div class="social-row">
        <button type="button" id="google-login" class="social-btn" aria-label="Google">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.7 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.6 14.6 2.7 12 2.7 6.9 2.7 2.7 6.9 2.7 12S6.9 21.3 12 21.3c6.9 0 9.1-4.8 9.1-7.3 0-.5 0-.8-.1-1.2H12z"/>
            <path fill="#34A853" d="M3.8 7.4l3.2 2.3C7.9 8 9.8 6.6 12 6.6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.6 14.6 2.7 12 2.7 8.3 2.7 5.1 4.8 3.8 7.4z"/>
            <path fill="#FBBC05" d="M3.8 16.6l3.2-2.3C6.7 13.7 6.6 12.9 6.6 12c0-.9.1-1.7.4-2.3L3.8 7.4C3.1 8.8 2.7 10.3 2.7 12s.4 3.2 1.1 4.6z"/>
            <path fill="#4285F4" d="M12 21.3c2.5 0 4.7-.8 6.3-2.3l-3-2.4c-.8.6-1.9 1-3.3 1-2.2 0-4.1-1.4-4.8-3.4l-3.2 2.3c1.3 2.7 4.5 4.8 8 4.8z"/>
          </svg>
        </button>
      </div>

      <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="../script.js"></script>
</body>
</html>
