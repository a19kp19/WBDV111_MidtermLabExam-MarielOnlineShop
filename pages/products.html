<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | Mariel Store</title>
  <meta name="description" content="Browse quality gadgets, appliances, furniture, and more at Mariel Store.">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../images/logo.png">
</head>
<body data-page="products">

<div id="site-header"></div>

<section class="page-header">
  <div class="container">
    <h1>Our <em>Products</em></h1>
    <p>Browse our collection of quality items for every need.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="section-head reveal">
      <span class="eyebrow">Shop by Category</span>
      <h2>Explore <em>categories</em></h2>
    </div>
    <div class="cats reveal">
      <a class="cat" href="?cat=furnitures"><img src="../images/products/furniture.jpg" alt="Furnitures Category"><span>Furnitures</span></a>
      <a class="cat" href="?cat=gadgets"><img src="../images/products/gadgets.jpg" alt="Gadgets Category"><span>Gadgets</span></a>
      <a class="cat" href="?cat=accessories"><img src="../images/products/accessories.jpg" alt="Accessories Category"><span>Accessories</span></a>
      <a class="cat" href="?cat=foods"><img src="../images/products/foods.jpg" alt="Foods Category"><span>Foods</span></a>
    </div>
  </div>
</section>

<section class="section section-white">
  <div class="container">
    <div class="section-head reveal">
      <span class="eyebrow">All Items</span>
      <h2>Featured <em>products</em></h2>
      <p class="lead">Search, filter and add to cart — checkout in seconds.</p>
    </div>
    <div class="toolbar" id="products-toolbar"></div>
    <div class="products" id="products-grid" style="scroll-margin-top: 80px"></div>
  </div>
</section>

<div id="site-footer"></div>

<script src="../script.js"></script>
</body>
</html>
